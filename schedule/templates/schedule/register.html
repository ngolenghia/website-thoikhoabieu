<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Tham gia Study Hub</title>
    <style>
        body { background: linear-gradient(135deg, #00c6fb 0%, #005bea 100%); height: 100vh; display: flex; align-items: center; }
        .auth-card { background: white; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 400px; padding: 40px; }
        .btn-success { border-radius: 10px; padding: 12px; font-weight: bold; }
        .form-control { border-radius: 10px; padding: 12px; }
    </style>
</head>
<body>
    <div class="auth-card mx-auto text-center">
        <h2 class="fw-bold mb-2">Tạo tài khoản</h2>
        <p class="text-muted mb-4">Bắt đầu quản lý thời gian hiệu quả hơn</p>
        
        {% if error %}<div class="alert alert-danger py-2 small">{{ error }}</div>{% endif %}
        
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3 text-start">
                <label class="small fw-bold">Chọn tên đăng nhập</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-4 text-start">
                <label class="small fw-bold">Mật khẩu</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success w-100 shadow-sm">ĐĂNG KÝ NGAY</button>
        </form>
        <p class="mt-4 small text-muted">Đã là thành viên? <a href="{% url 'login' %}" class="text-decoration-none fw-bold">Đăng nhập</a></p>
    </div>
</body>
</html>
