<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Đăng nhập - Study Hub</title>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; align-items: center; }
        .auth-card { background: white; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 400px; padding: 40px; }
        .btn-primary { background: #667eea; border: none; border-radius: 10px; padding: 12px; font-weight: bold; }
        .form-control { border-radius: 10px; padding: 12px; background: #f8f9fa; }
        /* Thêm style cho link quên mật khẩu */
        .forgot-password { font-size: 0.8rem; color: #667eea; text-decoration: none; }
        .forgot-password:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-card mx-auto text-center">
        <h2 class="fw-bold mb-2">Chào mừng trở lại!</h2>
        <p class="text-muted mb-4">Đăng nhập để xem lịch học của bạn</p>
        
        {% if error %}<div class="alert alert-danger py-2 small">{{ error }}</div>{% endif %}
        
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3 text-start">
                <label class="small fw-bold">Tên đăng nhập</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-2 text-start"> <label class="small fw-bold">Mật khẩu</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            
            <div class="mb-4 text-end">
                <a href="{% url 'reset_password' %}" class="forgot-password">Quên mật khẩu?</a>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 shadow-sm">ĐĂNG NHẬP</button>
        </form>
        <p class="mt-4 small text-muted">Chưa có tài khoản? <a href="{% url 'register' %}" class="text-decoration-none fw-bold">Đăng ký ngay</a></p>
    </div>
</body>
</html>
